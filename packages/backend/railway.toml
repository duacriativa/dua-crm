[build]
builder = "nixpacks"
buildCommand = "npm run build"

[deploy]
startCommand = "npx prisma migrate resolve --rolled-back 20260426000001_add_contracts_financial; npx prisma migrate deploy && node dist/main"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[deploy.healthcheck]
path = "/health"
timeout = 60
